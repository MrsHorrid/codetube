services:
  # PostgreSQL Database
  - type: postgres
    name: codetube-postgres
    ipAllowList: []
    plan: free

  # Redis Cache
  - type: redis
    name: codetube-redis
    ipAllowList: []
    plan: free

  # Backend API
  - type: web
    name: codetube-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: codetube-postgres
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: codetube-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
    healthCheckPath: /health
    plan: free

  # Frontend
  - type: web
    name: codetube-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: codetube-backend
          type: web
          property: host
    plan: free
