name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/backend
            ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:staging-latest
            ghcr.io/${{ github.repository }}/backend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:staging-latest
            ghcr.io/${{ github.repository }}/frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to Railway (optional - requires RAILWAY_TOKEN)
      - name: Deploy to Railway
        if: secrets.RAILWAY_TOKEN != ''
        uses: railway/cli@v3
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          args: up --service codetube-staging

      # Deploy to Render (optional - requires RENDER_SERVICE_ID and RENDER_API_KEY)
      - name: Deploy to Render
        if: secrets.RENDER_API_KEY != ''
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

      # Deploy via SSH (self-hosted or VPS)
      - name: Deploy to VPS via SSH
        if: secrets.SSH_HOST != ''
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/codetube
            
            # Pull latest images
            docker pull ghcr.io/${{ github.repository }}/backend:staging-latest
            docker pull ghcr.io/${{ github.repository }}/frontend:staging-latest
            
            # Update docker-compose to use new images
            sed -i 's|image:.*backend.*|image: ghcr.io/${{ github.repository }}/backend:staging-latest|' docker-compose.yml
            sed -i 's|image:.*frontend.*|image: ghcr.io/${{ github.repository }}/frontend:staging-latest|' docker-compose.yml
            
            # Deploy
            docker-compose up -d
            
            # Run migrations
            docker-compose exec -T backend npx prisma migrate deploy
            
            # Cleanup
            docker system prune -f

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Staging deployment completed successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed!"
          echo "Commit: ${{ github.sha }}"
